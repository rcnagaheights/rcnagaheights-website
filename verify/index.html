<!doctype html>
<html lang="en"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Verify a DiskwenTulong Card | Rotary Club of Naga Heights</title>
  <meta name="description" content="Verify a DiskwenTulong Card (DTC) at your business counter: check cardholder name, card status, and expiry.">
  <link rel="canonical" href="https://rcnagaheights.org/verify/">
  <meta name="theme-color" content="#0c3c7c">
  <link rel="icon" type="image/png" href="/assets/rotary-logo.png">
  <meta name="robots" content="noindex">
  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Rotary Club of Naga Heights">
  <meta property="og:title" content="Verify a DiskwenTulong Card | Rotary Club of Naga Heights">
  <meta property="og:description" content="Verify a DiskwenTulong Card (DTC) at your business counter: check cardholder name, card status, and expiry.">
  <meta property="og:url" content="https://rcnagaheights.org/verify/">
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@400;600;700;800&amp;family=Playfair+Display:wght@600;700;800&amp;display=swap" rel="stylesheet">
  <style>
:root{--blue:#17458f;--deep:#0c3c7c;--gold:#f7a81b;--mist:#f4f7fc}*{box-sizing:border-box}
body{margin:0;font-family:'Libre Franklin',sans-serif;color:#17324d}h1,h2,h3{font-family:'Playfair Display',serif}
.modal-hidden{display:none!important}
  </style>
 </head>
 <body data-template-id="__page-root" style="background: rgb(255, 255, 255);">
  <main class="min-h-screen flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-[336px]">
      <h1 class="text-2xl font-bold text-[#0c3c7c] mb-6 text-center">Verify a DiskwenTulong Card</h1>

      <form id="verify-form" class="bg-white border rounded-2xl p-6 grid gap-4">
       <div>
        <label for="card-number-input" class="block font-semibold text-sm mb-1">Card Number</label>
        <input id="card-number-input" type="text" required placeholder="DTC-2026-00001" class="w-full border rounded-lg px-4 py-3 text-lg" autocomplete="off">
       </div>
       <div>
        <label for="merchant-select" class="block font-semibold text-sm mb-1">Which merchant are you at?</label>
        <select id="merchant-select" required class="w-full border rounded-lg px-4 py-3">
         <option value="">Loading merchants&hellip;</option>
        </select>
       </div>
       <button type="submit" class="bg-[#17458f] hover:bg-[#0c3c7c] text-white font-semibold py-3 rounded-full transition-colors">Verify Card</button>
      </form>

      <div id="verify-result" class="modal-hidden mt-8 bg-white border rounded-2xl p-6"></div>
    </div>
  </main>

  <!-- Terms & Conditions gate -- must be accepted before the form above is usable -->
  <div id="tc-modal" class="fixed inset-0 z-50 bg-black/50 flex items-center justify-center px-4 py-8">
   <div class="bg-white rounded-2xl p-6 w-full max-w-[336px] max-h-[80vh] overflow-y-auto">
    <h2 class="text-xl font-bold text-[#0c3c7c] mb-4">Terms &amp; Conditions</h2>
    <p class="text-sm text-slate-600 mb-6">Terms and Conditions placeholder — replace with real text.</p>
    <button id="tc-accept-btn" class="w-full bg-[#17458f] hover:bg-[#0c3c7c] text-white font-semibold py-3 rounded-full transition-colors">I Accept</button>
   </div>
  </div>

  <script>
function escapeHtml(str){
  const div=document.createElement('div');
  div.textContent=str;
  return div.innerHTML;
}

document.getElementById('tc-accept-btn').addEventListener('click', function(){
  document.getElementById('tc-modal').classList.add('modal-hidden');
});

const APPS_SCRIPT_URL = 'https://script.google.com/a/macros/rcnagaheights.org/s/AKfycbyC6GIQA0BObLJ7UFUNdjt0moznACBfk-kUeWuzckl_9qyv3LONFx_WTiX42pAXirqC/exec';

const STATUS_STYLES = {
  'ACTIVE': 'bg-green-50 text-green-700 border-green-200',
  'EXPIRED': 'bg-amber-50 text-amber-700 border-amber-200',
  'SUSPENDED': 'bg-red-50 text-red-700 border-red-200',
  'UNREGISTERED': 'bg-slate-50 text-slate-600 border-slate-200',
  'INVALID CARD': 'bg-red-50 text-red-700 border-red-200'
};

function populateMerchantOptions(names){
  const select = document.getElementById('merchant-select');
  select.innerHTML = '<option value="">Select a merchant&hellip;</option>' +
    names.map(n => `<option value="${escapeHtml(n)}">${escapeHtml(n)}</option>`).join('');
}

function loadMerchantNamesFromFlat(partners){
  const names = [...new Set(partners.map(p => p.name).filter(Boolean))].sort();
  populateMerchantOptions(names);
}

fetch(`${APPS_SCRIPT_URL}?action=partners`)
  .then(r => r.json())
  .then(grouped => {
    const names = Object.values(grouped || {}).flat().map(p => p.name).filter(Boolean);
    if (!names.length) throw new Error('Live partner list is empty');
    populateMerchantOptions([...new Set(names)].sort());
  })
  .catch(() => {
    fetch('/assets/merchants/partners.json')
      .then(r => r.json())
      .then(loadMerchantNamesFromFlat)
      .catch(() => {
        document.getElementById('merchant-select').innerHTML = '<option value="">Merchant list unavailable</option>';
      });
  });

document.getElementById('verify-form').addEventListener('submit', function(e){
  e.preventDefault();
  const cardNumber = document.getElementById('card-number-input').value.trim();
  const merchant = document.getElementById('merchant-select').value;
  const resultBox = document.getElementById('verify-result');
  resultBox.classList.remove('modal-hidden');
  resultBox.innerHTML = '<p class="text-slate-500">Checking&hellip;</p>';

  fetch(`${APPS_SCRIPT_URL}?action=verify&cardNumber=${encodeURIComponent(cardNumber)}&merchant=${encodeURIComponent(merchant)}`)
    .then(r => r.json())
    .then(data => {
      if (data.error) throw new Error(data.error);
      const styles = STATUS_STYLES[data.status] || 'bg-slate-50 text-slate-600 border-slate-200';
      resultBox.innerHTML = `
        <div class="border rounded-xl p-5 ${styles}">
         <p class="text-xs font-bold uppercase tracking-wide">Status</p>
         <p class="text-2xl font-bold mt-1">${escapeHtml(data.status || 'UNKNOWN')}</p>
        </div>
        <div class="grid sm:grid-cols-2 gap-4 mt-4">
         <div><p class="text-xs font-bold uppercase tracking-wide text-slate-500">Cardholder Name</p><p class="text-lg mt-1">${escapeHtml(data.cardholder_name || '—')}</p></div>
         <div><p class="text-xs font-bold uppercase tracking-wide text-slate-500">Card Number</p><p class="text-lg mt-1">${escapeHtml(data.card_number || cardNumber)}</p></div>
         <div><p class="text-xs font-bold uppercase tracking-wide text-slate-500">Registered</p><p class="text-lg mt-1">${escapeHtml(data.registered_date || '—')}</p></div>
         <div><p class="text-xs font-bold uppercase tracking-wide text-slate-500">Expires</p><p class="text-lg mt-1">${escapeHtml(data.expiry_date || '—')}</p></div>
        </div>
        <p class="text-sm text-slate-500 mt-4">Compare this name against the physical card and a valid government ID before honoring any discount.</p>
      `;
    })
    .catch(() => {
      resultBox.innerHTML = '<p class="text-red-700">Could not verify this card right now. Please try again, or contact the club if this keeps happening.</p>';
    });
});
</script>
 </body></html>

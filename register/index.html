<!doctype html>
<html lang="en"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Register a DiskwenTulong Card | Rotary Club of Naga Heights</title>
  <meta name="description" content="Rotary Club of Naga Heights members: register a client's DiskwenTulong Card here.">
  <link rel="canonical" href="https://rcnagaheights.org/register/">
  <meta name="theme-color" content="#0c3c7c">
  <link rel="icon" type="image/png" href="/assets/rotary-logo.png">
  <meta name="robots" content="noindex">
  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Rotary Club of Naga Heights">
  <meta property="og:title" content="Register a DiskwenTulong Card | Rotary Club of Naga Heights">
  <meta property="og:description" content="Rotary Club of Naga Heights members: register a client's DiskwenTulong Card here.">
  <meta property="og:url" content="https://rcnagaheights.org/register/">
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@400;600;700;800&amp;family=Playfair+Display:wght@600;700;800&amp;display=swap" rel="stylesheet">
  <style>
:root{--blue:#17458f;--deep:#0c3c7c;--gold:#f7a81b;--mist:#f4f7fc}*{box-sizing:border-box}
body{margin:0;font-family:'Libre Franklin',sans-serif;color:#17324d}h1,h2,h3{font-family:'Playfair Display',serif}
.modal-hidden{display:none!important}
.form-disabled{opacity:.5;pointer-events:none}
  </style>
 </head>
 <body data-template-id="__page-root" style="background: rgb(255, 255, 255);">
  <main class="min-h-screen flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-[336px]">
      <h1 class="text-2xl font-bold text-[#0c3c7c] mb-6 text-center">Register a DiskwenTulong Card</h1>

      <p id="signin-status" class="text-sm text-center mb-4"></p>

      <form id="register-form" class="form-disabled bg-white border rounded-2xl p-6 grid gap-4">
       <div>
        <label for="full-name-input" class="block font-semibold text-sm mb-1">Client's Full Name</label>
        <input id="full-name-input" type="text" required placeholder="Juan Dela Cruz" class="w-full border rounded-lg px-4 py-3 text-lg" autocomplete="off">
       </div>
       <div class="min-w-0">
        <label for="card-batch-input" class="block font-semibold text-sm mb-1">Card Number</label>
        <div class="flex items-center gap-1.5">
         <span class="font-semibold text-slate-500 text-lg select-none">DTC-</span>
         <input id="card-batch-input" type="text" required placeholder="2026" class="flex-1 min-w-0 border rounded-lg px-2 py-3 text-lg text-center" autocomplete="off">
         <span class="font-semibold text-slate-500 text-lg select-none">-</span>
         <input id="card-serial-input" type="text" required placeholder="00001" inputmode="numeric" maxlength="5" class="flex-1 min-w-0 border rounded-lg px-2 py-3 text-lg text-center" autocomplete="off">
        </div>
       </div>
       <button id="register-submit-btn" type="submit" disabled class="bg-[#17458f] hover:bg-[#0c3c7c] text-white font-semibold py-3 rounded-full transition-colors disabled:opacity-50">Register Card</button>
      </form>

      <div id="register-result" class="modal-hidden mt-8 rounded-xl p-5 border"></div>
    </div>
  </main>

  <!-- Sign-in gate -- blocks the page until the member signs in. Deliberately
       does not mention the required @rcnagaheights.org domain anywhere in the
       UI copy, so an unauthorized visitor gets no hint about what account to
       target; the domain restriction is still fully enforced server-side by
       verifyIdToken_ in Code.gs (see docs/DTC-DESIGN.md section 3). -->
  <div id="signin-modal" class="fixed inset-0 z-50 bg-black/50 flex items-center justify-center px-4 py-8">
   <div class="bg-white rounded-2xl p-6 w-full max-w-[336px] text-center">
    <h2 class="text-xl font-bold text-[#0c3c7c] mb-5">Sign In</h2>
    <div id="g_id_onload"
         data-client_id="503057261558-f5bbseei4a54qokrkumjntv2p6tpl471.apps.googleusercontent.com"
         data-callback="handleCredentialResponse"
         data-auto_prompt="false">
    </div>
    <div class="g_id_signin flex justify-center" data-type="standard" data-shape="rectangular" data-theme="outline" data-size="large" data-text="signin_with"></div>
   </div>
  </div>

  <script>
function escapeHtml(str){
  const div=document.createElement('div');
  div.textContent=str;
  return div.innerHTML;
}

// Re-added 2026-07-19: Google Sign-In restricted to @rcnagaheights.org,
// via an explicit Sign In With Google button (a background fetch() POST
// can't trigger an interactive sign-in prompt, so this can't be done via
// the deployment's built-in identity). Real auth happens INSIDE
// Code.gs's registerCard_, via verifyIdToken_ checking the signed ID
// token's audience and @rcnagaheights.org domain -- see
// docs/DTC-DESIGN.md section 3. Uses the SAME public "Access: Anyone"
// deployment as /diskwentulong/ and /verify/ -- no separate deployment
// needed this time, since the access check is inside the code, not at
// Google's deployment gate (that mismatch was what broke the first
// attempt at this).
const APPS_SCRIPT_URL = 'https://script.google.com/a/macros/rcnagaheights.org/s/AKfycbyC6GIQA0BObLJ7UFUNdjt0moznACBfk-kUeWuzckl_9qyv3LONFx_WTiX42pAXirqC/exec';

let idToken = null;

function handleCredentialResponse(response){
  idToken = response.credential;
  let email = '';
  try {
    email = JSON.parse(atob(response.credential.split('.')[1])).email || '';
  } catch (err) { /* ignore -- show a generic message below if this fails */ }
  document.getElementById('signin-status').innerHTML = email
    ? `Signed in as <strong>${escapeHtml(email)}</strong>`
    : 'Signed in.';
  document.getElementById('signin-modal').classList.add('modal-hidden');
  document.getElementById('register-form').classList.remove('form-disabled');
  document.getElementById('register-submit-btn').disabled = false;
}

document.getElementById('register-form').addEventListener('submit', function(e){
  e.preventDefault();
  if (!idToken) {
    document.getElementById('signin-status').textContent = 'Please sign in first.';
    return;
  }
  const fullName = document.getElementById('full-name-input').value.trim();
  const batch = document.getElementById('card-batch-input').value.trim();
  const serial = document.getElementById('card-serial-input').value.trim().replace(/\D/g, '').padStart(5, '0');
  const cardNumber = `DTC-${batch}-${serial}`;
  const resultBox = document.getElementById('register-result');
  resultBox.classList.remove('modal-hidden');
  resultBox.className = 'mt-8 rounded-xl p-5 border bg-slate-50 text-slate-600 border-slate-200';
  resultBox.textContent = 'Registering…';

  fetch(`${APPS_SCRIPT_URL}?action=register`, {
    method: 'POST',
    body: JSON.stringify({ cardNumber, fullName, idToken })
  })
    .then(r => r.json())
    .then(data => {
      if (data.success) {
        resultBox.className = 'mt-8 rounded-xl p-5 border bg-green-50 text-green-700 border-green-200';
      } else {
        resultBox.className = 'mt-8 rounded-xl p-5 border bg-red-50 text-red-700 border-red-200';
      }
      resultBox.textContent = data.message || (data.success ? 'Card registered successfully.' : 'Registration failed.');
    })
    .catch(() => {
      resultBox.className = 'mt-8 rounded-xl p-5 border bg-red-50 text-red-700 border-red-200';
      resultBox.textContent = 'Could not reach the registration service. Please try again.';
    });
});
</script>
 </body></html>
